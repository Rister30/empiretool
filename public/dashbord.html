<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Empire Tool - Dashboard</title>
  <style>
    body { background: #0a0a0a; color: #FFE81F; font-family: Arial; text-align: center; padding: 40px; }
    h1 { font-size: 2em; }
    .logout { margin-top: 20px; padding: 10px 20px; background: #FFE81F; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <h1>⚔️ Empire Tool</h1>
  <p>Dashboard en construction...</p>
  <button class="logout" onclick="logout()">Se déconnecter</button>
  <script>
    if (!localStorage.getItem('token')) window.location.href = '/login.html'
    function logout() {
      localStorage.removeItem('token')
      window.location.href = '/login.html'
    }
  </script>
</body>
</html>
