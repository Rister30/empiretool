<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Empire Tool - Dispatch</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050508;
    color:white;
    font-family:'Inter',sans-serif;
    height:100vh;
    overflow:hidden;
    padding:15px;
}

body::before{
    content:'';
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(180,0,0,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,0,0,.03) 1px, transparent 1px);

    background-size:40px 40px;
    pointer-events:none;
}

body::after{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center,
    rgba(120,0,0,.08),
    transparent 60%);
    pointer-events:none;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.title{
    font-family:'Rajdhani',sans-serif;
    color:#cc0000;
    font-size:1.8rem;
    letter-spacing:3px;
    text-transform:uppercase;
}

.back-btn{
    background:transparent;
    border:1px solid #cc0000;
    color:#cc0000;
    padding:8px 15px;
    cursor:pointer;
    border-radius:3px;
    transition:.2s;
}

.back-btn:hover{
    background:#cc0000;
    color:black;
}

.dispatch-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:15px;
    height:calc(100vh - 80px);
}

.column{
    background:#0b0d14;
    border:1px solid #1d1111;
    border-top:2px solid #cc0000;
    border-radius:6px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.column-header{
    padding:15px;
    border-bottom:1px solid #1d1111;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.column-title{
    font-weight:600;
    font-size:.95rem;
}

.counter{
    width:24px;
    height:24px;
    border-radius:50%;
    background:#1a2233;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:.75rem;
}

.green{
    color:#3ddc84;
}

.orange{
    color:#ffb020;
}

.red{
    color:#ff4d4d;
}

.content{
    padding:10px;
    overflow-y:auto;
    flex:1;
}

.content::-webkit-scrollbar{
    width:5px;
}

.content::-webkit-scrollbar-thumb{
    background:#300;
}

.section-title{
    color:#cc0000;
    font-size:.8rem;
    font-weight:600;
    margin:10px 0;
    text-transform:uppercase;
}

.unit-card{
    background:#141925;
    border:1px solid #232d40;
    border-radius:8px;
    padding:12px;
    margin-bottom:12px;
    transition:.2s;
}

.unit-card:hover{
    border-color:#cc0000;
}

.unit-top{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
}

.callsign{
    font-size:1.2rem;
    font-weight:700;
}

.timer{
    font-size:.75rem;
    color:#777;
}

.officer{
    color:#bfc7d5;
    margin-bottom:10px;
}

.vehicle{
    font-size:.85rem;
    color:#8d96a7;
    margin-bottom:8px;
}

.badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:4px;
    font-size:.75rem;
    font-weight:600;
}

.badge-green{
    background:#163b25;
    color:#3ddc84;
}

.badge-orange{
    background:#4d350d;
    color:#ffb020;
}

.operation{
    color:#ff4d4d;
    margin-bottom:18px;
    font-weight:600;
}

.operation small{
    color:#777;
}

.search-card{
    background:#091018;
    border:1px solid #1f2d40;
    border-radius:8px;
    padding:12px;
}

.search-card img{
    width:100%;
    border-radius:6px;
    margin-bottom:10px;
}

.search-title{
    font-size:1.3rem;
    font-weight:700;
}

.search-owner{
    color:#999;
}

.plate{
    display:inline-block;
    margin-top:10px;
    background:#1b2940;
    color:#fff;
    padding:5px 10px;
    border-radius:4px;
}

.search-desc{
    color:#777;
    margin-top:10px;
}

.manage-btn{
    width:100%;
    margin-top:15px;
    padding:10px;
    border:1px solid #cc0000;
    background:transparent;
    color:#cc0000;
    cursor:pointer;
    border-radius:4px;
}

.manage-btn:hover{
    background:#cc0000;
    color:black;
}

.empty{
    color:#666;
    text-align:center;
    margin-top:40px;
}

</style>
</head>

<body>

<div class="header">

    <div class="title">📡 Empire Dispatch</div>

    <button
        class="back-btn"
        onclick="window.location.href='/dashboard.html'">
        ← Retour
    </button>

</div>

<div class="dispatch-grid">

    <!-- DISPONIBLE -->

    <div class="column">

        <div class="column-header">
            <span class="column-title green">● Disponible</span>
            <span class="counter">1</span>
        </div>

        <div class="content">

            <div class="section-title">
                Secteur Alpha (1)
            </div>

            <div class="unit-card">

                <div class="unit-top">
                    <div class="callsign">TK-051</div>
                    <div class="timer">2h18</div>
                </div>

                <div class="officer">
                    Cane Reed
                </div>

                <div class="vehicle">
                    Speeder Impérial • 9023
                </div>

                <span class="badge badge-green">
                    Disponible
                </span>

            </div>

        </div>

    </div>

    <!-- INTERVENTION -->

    <div class="column">

        <div class="column-header">
            <span class="column-title orange">
                ● En intervention
            </span>

            <span class="counter">0</span>
        </div>

        <div class="content">

            <div class="empty">
                Aucune unité engagée
            </div>

        </div>

    </div>

    <!-- OPERATIONS -->

    <div class="column">

        <div class="column-header">
            <span class="column-title orange">
                ● Opérations
            </span>

            <span class="counter">4</span>
        </div>

        <div class="content">

            <div class="operation">
                SWAT <small>(0)</small>
            </div>

            <div class="operation">
                Formation <small>(0)</small>
            </div>

            <div class="operation">
                Police Academy <small>(0)</small>
            </div>

            <div class="operation">
                Escorte <small>(0)</small>
            </div>

        </div>

    </div>

    <!-- RECHERCHES -->

    <div class="column">

        <div class="column-header">
            <span class="column-title red">
                ● Avis de recherche
            </span>

            <span class="counter">1</span>
        </div>

        <div class="content">

            <div class="search-card">

                <img src="https://placehold.co/500x250/000000/FFFFFF?text=Vehicule" alt="">

                <div class="search-title">
                    Archer Pro II
                </div>

                <div class="search-owner">
                    Rouge • Riley Jacobs
                </div>

                <div class="plate">
                    KBKD2828
                </div>

                <div class="search-desc">
                    Véhicule volé
                </div>

            </div>

            <button class="manage-btn">
                Gérer les recherches
            </button>

        </div>

    </div>

</div>

<script>

const token = localStorage.getItem('token')

if(!token){
    window.location.href='/login.html'
}

</script>

</body>
</html>
