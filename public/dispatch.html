<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Empire Tool - Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#050508; --card:#0a0808; --card2:#0f0a0a; --border:#1a0505; --border2:#2a0a0a;
  --red:#cc0000; --red2:#990000; --red-glow:rgba(200,0,0,.35);
  --green:#3ddc84; --orange:#ffb020; --blue:#4499ff; --gray:#555566;
  --text:#e0c0c0; --text2:#8a5050; --text3:#4a2020;
}

body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;}

body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(180,0,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(180,0,0,.04) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:1000px;height:1000px;background:radial-gradient(circle,rgba(150,0,0,.07),transparent 70%);
  pointer-events:none;z-index:0;}

#app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1;}

/* ── TOPBAR ── */
.topbar{display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:rgba(5,5,8,.95);}
.topbar-left{display:flex;align-items:center;gap:16px;}
.logo{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;
  color:var(--red);letter-spacing:4px;text-transform:uppercase;
  text-shadow:0 0 20px var(--red-glow);}
.kpi-chips{display:flex;gap:6px;}
.kpi{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:3px;
  font-size:.7rem;font-weight:600;letter-spacing:.5px;}
.kpi-dot{width:7px;height:7px;border-radius:50%;}
.kpi.green{background:#0a2014;color:var(--green);border:1px solid #0f3a1e;}
.kpi.orange{background:#2a1800;color:var(--orange);border:1px solid #3a2200;}
.kpi.red{background:#2a0a0a;color:#ff4d4d;border:1px solid #3a1010;}
.kpi-dot.green{background:var(--green);}
.kpi-dot.orange{background:var(--orange);}
.kpi-dot.red{background:#ff4d4d;}

.topbar-right{display:flex;align-items:center;gap:8px;}
.user-label{font-size:.7rem;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}

.btn-e{padding:6px 14px;background:transparent;color:var(--red);border:1px solid var(--red);
  border-radius:2px;cursor:pointer;font-size:.72rem;font-family:'Inter',sans-serif;font-weight:500;
  letter-spacing:1px;text-transform:uppercase;transition:background .2s,color .2s,box-shadow .2s;
  position:relative;}
.btn-e::before{content:'';position:absolute;top:-1px;left:-1px;width:5px;height:5px;
  border-top:1px solid var(--red);border-left:1px solid var(--red);}
.btn-e:hover{background:var(--red);color:#000;box-shadow:0 0 14px var(--red-glow);}
.btn-e.green-btn{color:var(--green);border-color:var(--green);}
.btn-e.green-btn::before{border-color:var(--green);}
.btn-e.green-btn:hover{background:var(--green);color:#000;box-shadow:0 0 14px rgba(61,220,132,.3);}
.btn-e.off{color:var(--red);border-color:#3a1010;background:#1a0505;}
.btn-statut{padding:6px 14px;background:#2a1800;color:var(--orange);border:1px solid #3a2200;
  border-radius:2px;cursor:pointer;font-size:.72rem;font-family:'Inter',sans-serif;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;transition:background .2s;position:relative;display:none;}
.btn-statut::before{content:'';position:absolute;top:-1px;left:-1px;width:5px;height:5px;
  border-top:1px solid var(--orange);border-left:1px solid var(--orange);}
.btn-statut.visible{display:inline-block;}
.btn-statut:hover{background:#341e00;}

/* ── MAIN LAYOUT ── */
#board{flex:1;display:flex;overflow:hidden;}

/* ── LEFT PANEL — EFFECTIFS ── */
.eff-panel{width:240px;min-width:240px;border-right:1px solid var(--border);
  display:flex;flex-direction:column;background:rgba(8,5,5,.97);transition:width .2s;}
.eff-panel.collapsed{width:44px;min-width:44px;}
.eff-panel.collapsed .eff-content,.eff-panel.collapsed .eff-filters,
.eff-panel.collapsed .eff-search,.eff-panel.collapsed .eff-head span,
.eff-panel.collapsed .eff-head .eff-count{display:none;}
.eff-panel.collapsed .eff-head{justify-content:center;padding:10px 0;}
.eff-mini{display:none;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;overflow-y:auto;flex:1;}
.eff-panel.collapsed .eff-mini{display:flex;}
.eff-mini::-webkit-scrollbar{width:0;}
.eff-mini-dot{width:32px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-size:.55rem;font-weight:800;cursor:default;}

.eff-head{padding:11px 13px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;cursor:pointer;}
.eff-head-icon{color:var(--red);font-size:.85rem;}
.eff-head span{font-size:.7rem;font-weight:600;letter-spacing:2px;color:var(--red);text-transform:uppercase;flex:1;}
.eff-count{min-width:22px;height:22px;border-radius:50%;background:#0f0707;border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:.68rem;color:#666;}
.eff-toggle{font-size:.7rem;color:var(--text3);transition:transform .2s;}

.eff-filters{display:flex;border-bottom:1px solid var(--border);}
.eff-ftab{flex:1;padding:7px 3px;font-size:.62rem;font-weight:600;letter-spacing:.4px;
  text-transform:uppercase;color:var(--text3);background:transparent;border:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;
  font-family:'Inter',sans-serif;}
.eff-ftab.active{color:var(--red);border-bottom-color:var(--red);}
.eff-ftab:hover:not(.active){color:#7a2020;}

.eff-search{padding:7px 9px;border-bottom:1px solid var(--border);}
.eff-search input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:2px;
  padding:6px 9px;color:var(--text);font-size:.75rem;font-family:'Inter',sans-serif;outline:none;
  transition:border-color .2s;}
.eff-search input:focus{border-color:var(--red);}
.eff-search input::placeholder{color:var(--text3);}

.eff-content{flex:1;overflow-y:auto;padding:6px;}
.eff-content::-webkit-scrollbar{width:3px;}
.eff-content::-webkit-scrollbar-thumb{background:var(--border2);}

.eff-group{margin-bottom:4px;}
.eff-group-title{display:flex;align-items:center;gap:5px;padding:5px 8px;
  font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);}
.eff-group-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.eff-group-count{margin-left:auto;font-weight:600;}
.eff-group.cat-online .eff-group-title{color:var(--green);}
.eff-group.cat-online .eff-group-dot{background:var(--green);}
.eff-group.cat-offline .eff-group-title{color:var(--text3);}
.eff-group.cat-offline .eff-group-dot{background:#3a1010;}

.eff-agent{display:flex;align-items:center;gap:7px;padding:7px 9px;
  border-radius:2px;margin-bottom:3px;cursor:pointer;transition:background .15s;
  border-left:2px solid transparent;}
.eff-agent:hover{background:rgba(20,5,5,.8);}
.eff-agent.is-me{border-left-color:var(--red);background:rgba(25,5,5,.8);}
.eff-agent.is-online{border-left-color:var(--green);}
.eff-agent-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.eff-agent-dot.on{background:var(--green);box-shadow:0 0 5px rgba(61,220,132,.5);}
.eff-agent-dot.off{background:#2a1010;}
.eff-agent-info{flex:1;min-width:0;}
.eff-agent-name{font-size:.78rem;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.eff-agent-meta{font-size:.65rem;color:var(--text3);margin-top:1px;}
.eff-agent-grade{font-size:.65rem;color:#3a1a1a;}

/* ── KANBAN COLUMNS ── */
.columns{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;}
.columns::-webkit-scrollbar{height:5px;}
.columns::-webkit-scrollbar-thumb{background:var(--border2);}

.col{min-width:220px;flex:1;border-right:1px solid var(--border);
  display:flex;flex-direction:column;background:rgba(6,4,4,.9);}
.col:last-child{border-right:none;}

.col-head{padding:11px 13px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(10,5,5,.9);position:relative;}
.col-head::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;}
.col-head.green::before{background:var(--green);}
.col-head.orange::before{background:var(--orange);}
.col-head.red::before{background:#ff4d4d;}
.col-head.blue::before{background:var(--blue);}
.col-head.gray::before{background:var(--gray);}

.col-name{font-size:.7rem;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.col-dot{width:7px;height:7px;border-radius:50%;}
.col-dot.green{background:var(--green);box-shadow:0 0 5px rgba(61,220,132,.5);}
.col-dot.orange{background:var(--orange);box-shadow:0 0 5px rgba(255,176,32,.5);}
.col-dot.red{background:#ff4d4d;box-shadow:0 0 5px rgba(255,77,77,.5);}
.col-dot.blue{background:var(--blue);box-shadow:0 0 5px rgba(68,153,255,.5);}
.col-dot.gray{background:var(--gray);}
.col-count{min-width:22px;height:22px;border-radius:50%;background:#0f0707;
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;
  font-size:.68rem;color:#666;}

.col-body{flex:1;overflow-y:auto;padding:9px;}
.col-body::-webkit-scrollbar{width:3px;}
.col-body::-webkit-scrollbar-thumb{background:var(--border2);}
.col-empty{color:#2a1010;font-size:.72rem;text-align:center;margin-top:20px;letter-spacing:1px;}

/* ── UNIT CARDS ── */
.unit-card{background:var(--card2);border:1px solid var(--border2);
  border-left:3px solid var(--green);border-radius:3px;
  padding:11px;margin-bottom:8px;position:relative;cursor:pointer;
  transition:border-color .2s,background .2s,box-shadow .2s;}
.unit-card::before{content:'';position:absolute;top:-1px;left:-1px;width:6px;height:6px;
  border-top:1px solid var(--green);border-left:1px solid var(--green);}
.unit-card:hover{background:rgba(25,8,8,.95);box-shadow:0 0 12px rgba(200,0,0,.1);}
.unit-card.is-me{border-left-color:var(--red);}
.unit-card.is-me::before{border-color:var(--red);}
.unit-card.orange{border-left-color:var(--orange);}
.unit-card.orange::before{border-color:var(--orange);}
.unit-card.red-card{border-left-color:#ff4d4d;}
.unit-card.red-card::before{border-color:#ff4d4d;}
.unit-card.blue-card{border-left-color:var(--blue);}
.unit-card.blue-card::before{border-color:var(--blue);}
.unit-card.gray-card{border-left-color:var(--gray);}
.unit-card.gray-card::before{border-color:var(--gray);}

.uc-top{display:flex;justify-content:space-between;margin-bottom:5px;}
.uc-id{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;color:#e0e0ff;letter-spacing:2px;}
.uc-time{font-size:.62rem;color:var(--text3);}
.uc-name{font-size:.78rem;color:var(--text);margin-bottom:3px;font-weight:500;}
.uc-grade{font-size:.68rem;color:#3a1a1a;margin-bottom:5px;}
.uc-action{font-size:.65rem;color:#3a2a10;font-style:italic;margin-bottom:6px;}
.uc-with{font-size:.65rem;color:#3a2a1a;margin-bottom:6px;}
.uc-badge{display:inline-block;padding:3px 8px;border-radius:2px;font-size:.65rem;font-weight:600;letter-spacing:.4px;}
.uc-badge.g{background:#0a2014;color:var(--green);}
.uc-badge.o{background:#2a1800;color:var(--orange);}
.uc-badge.r{background:#2a0505;color:#ff6644;}
.uc-badge.b{background:#0a1020;color:var(--blue);}
.uc-badge.gr{background:#1a1a22;color:var(--gray);}
.uc-me-badge{position:absolute;top:-7px;right:9px;background:var(--red);color:#000;
  font-size:.5rem;font-weight:800;padding:2px 6px;border-radius:2px;letter-spacing:.5px;}

/* ── RIGHT PANEL — INTERVENTIONS ── */
.int-panel{width:300px;min-width:300px;border-left:1px solid var(--border);
  display:flex;flex-direction:column;background:rgba(8,5,5,.97);transition:width .2s;}
.int-panel.collapsed{width:40px;min-width:40px;}
.int-panel.collapsed .int-content,.int-panel.collapsed .int-head span,
.int-panel.collapsed .int-head .int-count{display:none;}
.int-panel.collapsed .int-head{justify-content:center;}

.int-head{padding:11px 13px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;cursor:pointer;}
.int-head span{font-size:.7rem;font-weight:600;letter-spacing:2px;
  color:var(--orange);text-transform:uppercase;flex:1;}
.int-count{min-width:22px;height:22px;border-radius:50%;background:#1a0a00;
  border:1px solid #2a1500;display:flex;align-items:center;justify-content:center;
  font-size:.68rem;color:#664400;}
.int-toggle{font-size:.7rem;color:var(--text3);transition:transform .2s;}
.int-content{flex:1;overflow-y:auto;padding:9px;}
.int-content::-webkit-scrollbar{width:3px;}
.int-content::-webkit-scrollbar-thumb{background:var(--border2);}

/* Intervention card */
.int-card{background:var(--card2);border:1px solid var(--border2);
  border-left:3px solid var(--orange);border-radius:3px;
  padding:11px;margin-bottom:8px;position:relative;cursor:pointer;
  transition:background .15s;}
.int-card::before{content:'';position:absolute;top:-1px;left:-1px;width:6px;height:6px;
  border-top:1px solid var(--orange);border-left:1px solid var(--orange);}
.int-card:hover{background:rgba(25,8,8,.95);}
.ic-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.ic-type{font-size:.8rem;font-weight:700;color:var(--orange);}
.ic-badge{font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:2px;
  background:#2a1800;color:var(--orange);letter-spacing:.4px;text-transform:uppercase;}
.ic-lieu{font-size:.72rem;color:var(--text2);margin-bottom:3px;}
.ic-desc{font-size:.7rem;color:var(--text3);margin-bottom:6px;}
.ic-members{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.ic-member-chip{font-size:.65rem;font-weight:600;background:var(--card);
  color:var(--orange);padding:2px 7px;border-radius:2px;}
.ic-footer{display:flex;justify-content:space-between;align-items:center;}
.ic-time{font-size:.65rem;color:var(--text3);}
.ic-close-btn{padding:3px 8px;background:transparent;color:var(--green);
  border:1px solid rgba(61,220,132,.3);border-radius:2px;cursor:pointer;font-size:.65rem;
  font-family:'Inter',sans-serif;font-weight:600;transition:background .2s;}
.ic-close-btn:hover{background:rgba(61,220,132,.15);}

/* ── MODAL STATUT ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;z-index:100;
  opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#0a0808;border:1px solid #3a1010;border-top:2px solid var(--red);
  border-radius:3px;width:440px;max-height:80vh;overflow-y:auto;position:relative;
  transform:translateY(14px);transition:transform .2s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal::before{content:'';position:absolute;top:-1px;left:-1px;width:9px;height:9px;
  border-top:2px solid var(--red);border-left:2px solid var(--red);}
.modal::after{content:'';position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;
  border-bottom:1px solid var(--red);border-right:1px solid var(--red);}
.modal-head{padding:14px 18px 11px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:700;
  color:var(--red);letter-spacing:3px;text-transform:uppercase;}
.modal-close{background:transparent;border:none;color:var(--text3);font-size:1rem;cursor:pointer;}
.modal-close:hover{color:var(--red);}
.modal-body{padding:14px 18px;}
.field-lbl{font-size:.62rem;font-weight:600;letter-spacing:2px;color:#5a2020;
  text-transform:uppercase;margin-bottom:7px;display:block;}
.field-div{height:1px;background:var(--border);margin:4px 0 14px;}

/* Status opts */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.status-opt{background:#0f0a0a;border:1px solid var(--border2);border-radius:2px;
  padding:9px 11px;cursor:pointer;transition:border-color .2s,background .2s;
  display:flex;align-items:center;gap:7px;}
.status-opt:hover{border-color:#4a1a1a;background:#130808;}
.status-opt.selected{border-color:var(--red);background:#180808;}
.so-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.so-dot.green{background:var(--green);}
.so-dot.orange{background:var(--orange);}
.so-dot.red{background:#ff4d4d;}
.so-dot.blue{background:var(--blue);}
.so-dot.gray{background:var(--gray);}
.so-label{font-size:.73rem;font-weight:600;color:var(--text);}

/* With list */
.with-list{display:flex;flex-direction:column;gap:5px;max-height:130px;overflow-y:auto;margin-bottom:14px;}
.with-list::-webkit-scrollbar{width:3px;}
.with-list::-webkit-scrollbar-thumb{background:var(--border2);}
.with-opt{display:flex;align-items:center;gap:7px;padding:6px 9px;
  background:#0f0a0a;border:1px solid var(--border2);border-radius:2px;
  cursor:pointer;transition:border-color .2s,background .2s;}
.with-opt:hover{border-color:#2a1010;}
.with-opt.selected{border-color:var(--red);background:#180808;}
.with-check{width:13px;height:13px;border:1px solid #3a1010;border-radius:2px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:.58rem;color:var(--red);}
.with-opt.selected .with-check{background:var(--red);color:#000;border-color:var(--red);}
.with-name{font-size:.73rem;color:var(--text);}
.with-grade{font-size:.63rem;color:var(--text3);margin-left:auto;}

/* Action input */
.action-input{width:100%;background:#0a0505;border:1px solid var(--border2);border-radius:2px;
  padding:8px 11px;color:var(--text);font-size:.78rem;font-family:'Inter',sans-serif;
  outline:none;margin-bottom:14px;transition:border-color .2s;}
.action-input:focus{border-color:var(--red);}
.action-input::placeholder{color:var(--text3);}

.modal-footer{display:flex;gap:7px;}
.btn-confirm{flex:1;padding:9px;background:transparent;color:var(--red);
  border:1px solid var(--red);border-radius:2px;cursor:pointer;font-size:.73rem;
  font-family:'Inter',sans-serif;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;transition:background .2s,color .2s,box-shadow .2s;}
.btn-confirm:hover{background:var(--red);color:#000;box-shadow:0 0 14px var(--red-glow);}
.btn-cancel-s{padding:9px 14px;background:transparent;color:var(--text3);
  border:1px solid var(--border);border-radius:2px;cursor:pointer;font-size:.73rem;
  font-family:'Inter',sans-serif;font-weight:500;letter-spacing:1px;text-transform:uppercase;
  transition:border-color .2s,color .2s;}
.btn-cancel-s:hover{border-color:#3a1010;color:#7a2020;}

/* ── MODAL INTERVENTION ── */
.int-modal{background:#0a0808;border:1px solid #3a1010;border-top:2px solid var(--orange);
  border-radius:3px;width:420px;max-height:80vh;overflow-y:auto;position:relative;
  transform:translateY(14px);transition:transform .2s;}
.modal-overlay.open .int-modal{transform:translateY(0);}
.int-modal::before{content:'';position:absolute;top:-1px;left:-1px;width:9px;height:9px;
  border-top:2px solid var(--orange);border-left:2px solid var(--orange);}
.int-modal::after{content:'';position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;
  border-bottom:1px solid var(--orange);border-right:1px solid var(--orange);}
.int-modal .modal-title{color:var(--orange);}

.form-group{margin-bottom:13px;}
.form-group label{display:block;font-size:.62rem;font-weight:600;
  letter-spacing:2px;color:#5a3030;text-transform:uppercase;margin-bottom:5px;}
.form-group input,.form-group textarea,.form-group select{width:100%;
  padding:9px 11px;background:#0a0505;border:1px solid var(--border2);border-radius:2px;
  color:var(--text);font-size:.82rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--orange);}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--text3);}
.form-group textarea{resize:vertical;min-height:55px;}
.form-group select{cursor:pointer;}
.form-group select option{background:#0a0505;color:var(--text);}
.btn-confirm-orange{background:transparent;color:var(--orange);border:1px solid var(--orange);
  border-radius:2px;padding:9px 18px;cursor:pointer;font-size:.73rem;font-family:'Inter',sans-serif;
  font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:background .2s,color .2s;}
.btn-confirm-orange:hover{background:var(--orange);color:#000;}

/* ── TOAST ── */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);
  background:rgba(10,5,5,.97);border:1px solid var(--red);border-radius:2px;
  padding:9px 18px;font-size:.73rem;font-weight:600;letter-spacing:1px;
  color:var(--red);text-transform:uppercase;z-index:999;
  transition:transform .3s;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.t-green{border-color:var(--green);color:var(--green);}
#toast.t-orange{border-color:var(--orange);color:var(--orange);}

/* ── SECTION LABELS ── */
.sec-lbl{padding:6px 10px 3px;font-size:.6rem;font-weight:600;
  letter-spacing:2px;color:var(--text3);text-transform:uppercase;}
.sec-lbl.online-lbl{color:#1a5030;}

/* pulse dot */
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.pulse{animation:pulse-dot 2s infinite;}

/* confirm overlay */
.confirm-box{background:var(--card);border:1px solid #3a1010;border-top:2px solid var(--red);
  border-radius:3px;padding:24px;text-align:center;max-width:340px;width:90%;}
.confirm-box p{margin-bottom:18px;font-size:.88rem;color:var(--text);line-height:1.4;}
.confirm-actions{display:flex;gap:8px;}
.btn-yes{flex:1;padding:9px;border:none;border-radius:2px;
  background:var(--red);color:#000;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-no{flex:1;padding:9px;border:1px solid var(--border2);border-radius:2px;
  background:transparent;color:var(--text2);font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-no:hover{color:var(--text);}
</style>
</head>
<body>
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">📡 Empire Dispatch</div>
      <div class="kpi-chips">
        <div class="kpi green"><span class="kpi-dot green"></span><span id="count-dispo">0</span> disponible</div>
        <div class="kpi orange"><span class="kpi-dot orange"></span><span id="count-interv">0</span> intervention</div>
        <div class="kpi red"><span class="kpi-dot red pulse"></span><span id="count-online">0</span> en service</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="user-label" id="user-label"></span>
      <button class="btn-statut" id="btn-statut" onclick="openStatutModal()">⚙ Mon statut</button>
      <button class="btn-e off" id="btn-service" onclick="toggleService()">● Se mettre en service</button>
      <button class="btn-e" onclick="openIntModal()">+ Intervention</button>
      <button class="btn-e" onclick="window.location.href='/dashboard.html'">← Retour</button>
    </div>
  </div>

  <!-- BOARD -->
  <div id="board">

    <!-- LEFT: EFFECTIFS -->
    <div class="eff-panel" id="effPanel">
      <div class="eff-head" onclick="toggleEffPanel()">
        <span class="eff-head-icon">⚔</span>
        <span>Effectifs</span>
        <span class="eff-count" id="eff-count">0</span>
        <span class="eff-toggle" id="eff-toggle">◀</span>
      </div>
      <div class="eff-filters">
        <button class="eff-ftab active" onclick="setEffFilter('all',this)">Tous</button>
        <button class="eff-ftab" onclick="setEffFilter('online',this)">En service</button>
        <button class="eff-ftab" onclick="setEffFilter('offline',this)">Hors service</button>
      </div>
      <div class="eff-search">
        <input type="text" id="eff-search" placeholder="Rechercher..." oninput="renderEffectifs()">
      </div>
      <div class="eff-content" id="eff-list"></div>
      <div class="eff-mini" id="eff-mini"></div>
    </div>

    <!-- CENTER: KANBAN -->
    <div class="columns" id="columns">
      <!-- rendered by JS -->
    </div>

    <!-- RIGHT: INTERVENTIONS -->
    <div class="int-panel" id="intPanel">
      <div class="int-head" onclick="toggleIntPanel()">
        <span style="color:var(--orange);font-size:.85rem;">⚡</span>
        <span>Interventions</span>
        <span class="int-count" id="int-count">0</span>
        <span class="int-toggle" id="int-toggle">▶</span>
      </div>
      <div class="int-content" id="int-list"></div>
    </div>
  </div>
</div>

<!-- MODAL STATUT -->
<div class="modal-overlay" id="modal-statut" onclick="closeOnOverlay(event,'modal-statut')">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Mon Statut</span>
      <button class="modal-close" onclick="closeModal('modal-statut')">✕</button>
    </div>
    <div class="modal-body">
      <span class="field-lbl">Statut</span>
      <div class="status-grid">
        <div class="status-opt selected" data-status="dispo" onclick="selectStatus(this)">
          <span class="so-dot green"></span><span class="so-label">Disponible</span>
        </div>
        <div class="status-opt" data-status="interv" onclick="selectStatus(this)">
          <span class="so-dot orange"></span><span class="so-label">Intervention</span>
        </div>
        <div class="status-opt" data-status="occupe" onclick="selectStatus(this)">
          <span class="so-dot red"></span><span class="so-label">Occupé</span>
        </div>
        <div class="status-opt" data-status="op" onclick="selectStatus(this)">
          <span class="so-dot blue"></span><span class="so-label">Opération</span>
        </div>
        <div class="status-opt" data-status="pause" onclick="selectStatus(this)">
          <span class="so-dot gray"></span><span class="so-label">En pause</span>
        </div>
        <div class="status-opt" data-status="form" onclick="selectStatus(this)">
          <span class="so-dot blue"></span><span class="so-label">Formation</span>
        </div>
      </div>
      <div class="field-div"></div>
      <span class="field-lbl">Avec qui ? (optionnel)</span>
      <div class="with-list" id="with-list"></div>
      <div class="field-div"></div>
      <span class="field-lbl">Activité (optionnel)</span>
      <input type="text" class="action-input" id="action-input" placeholder="ex: Patrouille Secteur Coruscant...">
      <div class="modal-footer">
        <button class="btn-cancel-s" onclick="closeModal('modal-statut')">Annuler</button>
        <button class="btn-confirm" onclick="confirmStatut()">✓ Confirmer</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL INTERVENTION -->
<div class="modal-overlay" id="modal-intervention" onclick="closeOnOverlay(event,'modal-intervention')">
  <div class="int-modal">
    <div class="modal-head">
      <span class="modal-title">Nouvelle Intervention</span>
      <button class="modal-close" onclick="closeModal('modal-intervention')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Type *</label>
        <select id="int-type">
          <option value="Poursuite">Poursuite</option>
          <option value="Arrestation">Arrestation</option>
          <option value="Traque">Traque</option>
          <option value="Opération">Opération</option>
          <option value="Interrogatoire">Interrogatoire</option>
          <option value="Exécution">Exécution</option>
          <option value="Autre">Autre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Lieu</label>
        <input type="text" id="int-lieu" placeholder="ex: Secteur Alpha, Planète Korriban...">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="int-desc" placeholder="Détails de l'intervention..."></textarea>
      </div>
      <div class="modal-footer" style="margin-top:0;">
        <button class="btn-cancel-s" onclick="closeModal('modal-intervention')">Annuler</button>
        <button class="btn-confirm-orange" onclick="saveIntervention()">✓ Lancer</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CONFIRM -->
<div class="modal-overlay" id="modal-confirm" onclick="closeOnOverlay(event,'modal-confirm')">
  <div class="confirm-box">
    <p id="confirm-msg">Confirmer ?</p>
    <div class="confirm-actions">
      <button class="btn-no" onclick="closeModal('modal-confirm')">Annuler</button>
      <button class="btn-yes" id="confirm-yes">Confirmer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  EMPIRE DISPATCH — Main Script
// ══════════════════════════════════════════════

const token = localStorage.getItem('token')
if (!token) window.location.href = '/login.html'

let myId = null, myUsername = null, myRole = null
try {
  const p = JSON.parse(atob(token.split('.')[1]))
  myId       = p.id
  myUsername = p.username || '—'
  myRole     = p.role || 'membre'
} catch(e) { window.location.href = '/login.html' }

document.getElementById('user-label').textContent = myUsername

// ── Role labels ──
const ROLE_LABELS = {
  admin:'Admin', mdcn:'Membre du Conseil Noir', darth:'Darth', seigneur:'Seigneur',
  maitrecaste:'Maître de Caste', mrava:'Maître des Ravageurs', msorcier:'Maître des Sorciers',
  mmarau:'Maître des Maraudeurs', masassin:'Maître des Assassins', grandespe:'Grande Spécialisation',
  grava:'Grand Ravageur', gsorcier:'Grand Sorcier', gmarau:'Grand Maraudeur', gasassin:'Grand Assassin',
  rava:'Ravageur', marau:'Maraudeur', assassin:'Assassin', sorcier:'Sorcier',
  guerrier:'Guerrier', inqui:'Inquisiteur', acolyte:'Acolyte', membre:'Membre',
}
const roleLabel = r => ROLE_LABELS[r] || r || '—'

// ── State ──
let allUsers     = []
let onlineSet    = new Set()
let startTimes   = {}
let playerStatus = {}
let currentEffFilter = 'all'
let selectedStatus = 'dispo'
let selectedWith   = new Set()
let interventions  = []

// ── Column definitions ──
const COLUMNS = [
  { id:'dispo',  label:'Disponible',    color:'green',  dot:'green',  statuses:['dispo'] },
  { id:'interv', label:'Intervention',  color:'orange', dot:'orange', statuses:['interv','occupe'] },
  { id:'op',     label:'Opération',     color:'blue',   dot:'blue',   statuses:['op','form'] },
  { id:'pause',  label:'Pause',         color:'gray',   dot:'gray',   statuses:['pause'] },
]

const STATUS_META = {
  dispo:  { label:'Disponible',   badge:'g',  colClass:'' },
  interv: { label:'Intervention', badge:'o',  colClass:'orange' },
  occupe: { label:'Occupé',       badge:'r',  colClass:'red-card' },
  op:     { label:'Opération',    badge:'b',  colClass:'blue-card' },
  pause:  { label:'En pause',     badge:'gr', colClass:'gray-card' },
  form:   { label:'Formation',    badge:'b',  colClass:'blue-card' },
}
const sMeta   = s => STATUS_META[s] || STATUS_META.dispo
const sLabel  = s => sMeta(s).label
const sBadge  = s => sMeta(s).badge
const sClass  = s => sMeta(s).colClass

// ── API helpers ──
const authH = () => ({ 'Content-Type':'application/json', 'Authorization':'Bearer '+token })

async function apiGet(url) {
  const r = await fetch(url, { headers: authH() })
  if (r.status === 401) { localStorage.removeItem('token'); window.location.href='/login.html'; return null }
  return r.ok ? r.json() : null
}
async function apiPost(url, body) {
  const r = await fetch(url, { method:'POST', headers: authH(), body: JSON.stringify(body) })
  if (r.status === 401) { localStorage.removeItem('token'); window.location.href='/login.html'; return null }
  return r.ok ? r.json() : null
}

// ── Toast ──
let _toastTimer = null
function toast(msg, type='red') {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.className = type === 'green' ? 'show t-green' : type === 'orange' ? 'show t-orange' : 'show'
  clearTimeout(_toastTimer)
  _toastTimer = setTimeout(() => t.classList.remove('show','t-green','t-orange'), 2500)
}

// ── Confirm ──
function confirm2(msg, onYes) {
  document.getElementById('confirm-msg').textContent = msg
  const btn = document.getElementById('confirm-yes')
  const nb = btn.cloneNode(true)
  btn.parentNode.replaceChild(nb, btn)
  nb.id = 'confirm-yes'
  nb.addEventListener('click', () => { closeModal('modal-confirm'); onYes() })
  openModal('modal-confirm')
}

// ── Modals ──
function openModal(id) { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }
function closeOnOverlay(e, id) { if (e.target.id === id) closeModal(id) }

// ── Elapsed time ──
function elapsed(id) {
  if (!startTimes[id]) return ''
  const s = Math.floor((Date.now() - startTimes[id]) / 1000)
  const m = Math.floor(s/60), h = Math.floor(m/60)
  if (h > 0) return h+'h'+String(m%60).padStart(2,'0')
  if (m > 0) return m+'min'
  return '< 1min'
}

// ══════════════════════════════════════════════
//  LOAD DATA
// ══════════════════════════════════════════════
async function loadData() {
  // Users
  try {
    const u = await apiGet('/api/admin/users')
    if (Array.isArray(u)) allUsers = u
  } catch(e) { allUsers = [] }

  // Dispatch state
  try {
    const s = await apiGet('/api/dispatch/status')
    if (s) {
      onlineSet    = new Set(s.online_ids || [])
      startTimes   = {}
      ;(s.start_times || []).forEach(({id, ts}) => { startTimes[id] = ts })
      playerStatus = s.player_status || {}
    }
  } catch(e) {}

  // Interventions (stored locally for now — persisted in DB via dispatch)
  syncServiceBtn()
  renderAll()
}

// ══════════════════════════════════════════════
//  SERVICE
// ══════════════════════════════════════════════
async function toggleService() {
  const isOnline = onlineSet.has(myId)
  try {
    await apiPost('/api/dispatch/service', { online: !isOnline })
  } catch(e) {}

  if (isOnline) {
    onlineSet.delete(myId)
    delete startTimes[myId]
    delete playerStatus[myId]
    document.getElementById('btn-statut').classList.remove('visible')
    toast('Hors service')
  } else {
    onlineSet.add(myId)
    startTimes[myId] = Date.now()
    playerStatus[myId] = { status:'dispo', with:[], action:'' }
    document.getElementById('btn-statut').classList.add('visible')
    toast('En service', 'green')
    setTimeout(openStatutModal, 400)
  }
  syncServiceBtn()
  renderAll()
}

function syncServiceBtn() {
  const btn = document.getElementById('btn-service')
  const isOnline = onlineSet.has(myId)
  btn.textContent = isOnline ? '● Hors service' : '● Se mettre en service'
  btn.className = isOnline ? 'btn-e green-btn' : 'btn-e off'
  if (isOnline) {
    document.getElementById('btn-statut').classList.add('visible')
  } else {
    document.getElementById('btn-statut').classList.remove('visible')
  }
}

// ══════════════════════════════════════════════
//  MODAL STATUT
// ══════════════════════════════════════════════
function openStatutModal() {
  if (!onlineSet.has(myId)) return
  const cur = playerStatus[myId] || {}
  selectedStatus = cur.status || 'dispo'
  selectedWith   = new Set(cur.with || [])
  document.getElementById('action-input').value = cur.action || ''

  document.querySelectorAll('.status-opt').forEach(el => {
    el.classList.toggle('selected', el.dataset.status === selectedStatus)
  })

  const others = allUsers.filter(u => onlineSet.has(u.id) && u.id !== myId)
  const wl = document.getElementById('with-list')
  if (!others.length) {
    wl.innerHTML = '<div style="font-size:.7rem;color:var(--text3);padding:4px;">Aucun autre membre en service</div>'
  } else {
    wl.innerHTML = others.map(u => `
      <div class="with-opt${selectedWith.has(u.id)?' selected':''}" onclick="toggleWith(${u.id},this)">
        <div class="with-check">${selectedWith.has(u.id)?'✓':''}</div>
        <span class="with-name">${u.username}</span>
        <span class="with-grade">${roleLabel(u.role)}</span>
      </div>`).join('')
  }
  openModal('modal-statut')
}

function selectStatus(el) {
  selectedStatus = el.dataset.status
  document.querySelectorAll('.status-opt').forEach(o => o.classList.remove('selected'))
  el.classList.add('selected')
}

function toggleWith(id, el) {
  if (selectedWith.has(id)) {
    selectedWith.delete(id)
    el.classList.remove('selected')
    el.querySelector('.with-check').textContent = ''
  } else {
    selectedWith.add(id)
    el.classList.add('selected')
    el.querySelector('.with-check').textContent = '✓'
  }
}

async function confirmStatut() {
  playerStatus[myId] = {
    status: selectedStatus,
    with:   [...selectedWith],
    action: document.getElementById('action-input').value.trim()
  }
  try {
    await apiPost('/api/dispatch/statut', {
      status: selectedStatus,
      with: [...selectedWith],
      action: document.getElementById('action-input').value.trim()
    })
  } catch(e) {}
  closeModal('modal-statut')
  renderAll()
  toast('Statut mis à jour', 'orange')
}

// ══════════════════════════════════════════════
//  INTERVENTIONS (stockées côté client + BDD)
// ══════════════════════════════════════════════
function openIntModal() {
  document.getElementById('int-type').value = 'Poursuite'
  document.getElementById('int-lieu').value = ''
  document.getElementById('int-desc').value = ''
  openModal('modal-intervention')
}

function saveIntervention() {
  const type = document.getElementById('int-type').value
  const lieu = document.getElementById('int-lieu').value.trim()
  const desc = document.getElementById('int-desc').value.trim()
  if (!type) { toast('Type requis'); return }

  interventions.push({
    id: Date.now(),
    type, lieu, desc,
    members: onlineSet.has(myId) ? [myId] : [],
    createdAt: Date.now()
  })
  closeModal('modal-intervention')
  renderInterventions()
  toast('Intervention lancée', 'orange')
}

function closeIntervention(id) {
  confirm2('Clôturer cette intervention ?', () => {
    interventions = interventions.filter(i => i.id !== id)
    renderInterventions()
    toast('Intervention clôturée', 'green')
  })
}

function assignMeToInt(id) {
  const int = interventions.find(i => i.id === id)
  if (!int || !onlineSet.has(myId)) { toast('Vous devez être en service'); return }
  if (!int.members.includes(myId)) int.members.push(myId)
  renderInterventions()
  toast('Affecté à l\'intervention', 'orange')
}

// ══════════════════════════════════════════════
//  RENDER ALL
// ══════════════════════════════════════════════
function renderAll() {
  renderEffectifs()
  renderColumns()
  renderInterventions()
  updateKpis()
}

// ── KPIs ──
function updateKpis() {
  const online = [...onlineSet]
  const dispo  = online.filter(id => (playerStatus[id]?.status || 'dispo') === 'dispo').length
  const interv = online.filter(id => {
    const s = playerStatus[id]?.status
    return s && s !== 'dispo'
  }).length
  document.getElementById('count-dispo').textContent  = dispo
  document.getElementById('count-interv').textContent = interv
  document.getElementById('count-online').textContent = online.length
}

// ══════════════════════════════════════════════
//  EFFECTIFS PANEL
// ══════════════════════════════════════════════
let effPanelCollapsed = false
function toggleEffPanel() {
  effPanelCollapsed = !effPanelCollapsed
  const p = document.getElementById('effPanel')
  const t = document.getElementById('eff-toggle')
  p.classList.toggle('collapsed', effPanelCollapsed)
  t.textContent = effPanelCollapsed ? '▶' : '◀'
}

let effFilter = 'all'
function setEffFilter(f, el) {
  effFilter = f
  document.querySelectorAll('.eff-ftab').forEach(t => t.classList.remove('active'))
  el.classList.add('active')
  renderEffectifs()
}

function renderEffectifs() {
  const q   = (document.getElementById('eff-search')?.value || '').toLowerCase()
  const list = document.getElementById('eff-list')
  if (!list) return

  const online  = allUsers.filter(u => onlineSet.has(u.id))
  const offline = allUsers.filter(u => !onlineSet.has(u.id))

  let meOnline = null, othersOnline = []
  online.forEach(u => {
    if (u.id === myId) meOnline = u
    else othersOnline.push(u)
  })

  let html = ''
  const matchQ = u => !q || u.username.toLowerCase().includes(q) || roleLabel(u.role).toLowerCase().includes(q)

  if (effFilter !== 'offline') {
    if (meOnline && matchQ(meOnline)) {
      const st = playerStatus[meOnline.id] || {}
      html += `<div class="sec-lbl online-lbl">● Vous</div>
        <div class="eff-agent is-me">
          <span class="eff-agent-dot on"></span>
          <div class="eff-agent-info">
            <div class="eff-agent-name">${meOnline.username} <span style="font-size:.58rem;color:var(--red);">(moi)</span></div>
            <div class="eff-agent-grade">${roleLabel(meOnline.role)}</div>
            ${st.status ? `<div class="eff-agent-meta">${sLabel(st.status)}${st.action?' · '+st.action:''}</div>` : ''}
            ${elapsed(meOnline.id) ? `<div class="eff-agent-meta">⏱ ${elapsed(meOnline.id)}</div>` : ''}
          </div>
        </div>`
    }
    if (othersOnline.filter(matchQ).length) {
      html += `<div class="sec-lbl online-lbl">● En service (${othersOnline.filter(matchQ).length})</div>`
      othersOnline.filter(matchQ).forEach(u => {
        const st = playerStatus[u.id] || {}
        html += `<div class="eff-agent is-online">
          <span class="eff-agent-dot on"></span>
          <div class="eff-agent-info">
            <div class="eff-agent-name">${u.username}</div>
            <div class="eff-agent-grade">${roleLabel(u.role)}</div>
            ${st.status ? `<div class="eff-agent-meta">${sLabel(st.status)}${st.action?' · '+st.action:''}</div>` : ''}
            ${elapsed(u.id) ? `<div class="eff-agent-meta">⏱ ${elapsed(u.id)}</div>` : ''}
          </div>
        </div>`
      })
    }
  }

  if (effFilter !== 'online') {
    const offVis = offline.filter(matchQ)
    if (offVis.length) {
      html += `<div class="sec-lbl">Hors service (${offVis.length})</div>`
      offVis.forEach(u => {
        html += `<div class="eff-agent">
          <span class="eff-agent-dot off"></span>
          <div class="eff-agent-info">
            <div class="eff-agent-name">${u.username}</div>
            <div class="eff-agent-grade">${roleLabel(u.role)}</div>
          </div>
        </div>`
      })
    }
  }

  if (!html) html = '<div class="col-empty" style="margin-top:18px;">Aucun résultat</div>'
  list.innerHTML = html
  document.getElementById('eff-count').textContent = allUsers.length

  // Mini panel
  const mini = document.getElementById('eff-mini')
  mini.innerHTML = online.map(u => {
    const isMe = u.id === myId
    const bg = isMe ? 'var(--red)' : 'var(--green)'
    const col = '#000'
    return `<div class="eff-mini-dot" style="background:${bg};color:${col};" title="${u.username} — ${roleLabel(u.role)}">${u.username.substring(0,3).toUpperCase()}</div>`
  }).join('')
}

// ══════════════════════════════════════════════
//  KANBAN COLUMNS
// ══════════════════════════════════════════════
function renderColumns() {
  const container = document.getElementById('columns')
  container.innerHTML = ''

  COLUMNS.forEach(col => {
    const users = allUsers.filter(u => {
      if (!onlineSet.has(u.id)) return false
      const s = playerStatus[u.id]?.status || 'dispo'
      return col.statuses.includes(s)
    })

    const colEl = document.createElement('div')
    colEl.className = 'col'

    colEl.innerHTML = `
      <div class="col-head ${col.color}">
        <div class="col-name"><span class="col-dot ${col.dot}"></span>${col.label}</div>
        <span class="col-count" id="col-count-${col.id}">${users.length}</span>
      </div>
      <div class="col-body" id="col-${col.id}">
        ${users.length === 0 ? '<div class="col-empty">Aucune unité</div>' : users.map(u => buildCard(u)).join('')}
      </div>`

    container.appendChild(colEl)
  })
}

function buildCard(u) {
  const st    = playerStatus[u.id] || { status:'dispo', with:[], action:'' }
  const isMe  = u.id === myId
  const n     = String(allUsers.indexOf(u)+1).padStart(2,'0')
  const cls   = sClass(st.status)
  const badge = sBadge(st.status)
  const lbl   = sLabel(st.status)
  const withNames = (st.with||[]).map(wid => allUsers.find(x=>x.id===wid)?.username).filter(Boolean).join(', ')
  const t     = elapsed(u.id)

  return `<div class="unit-card ${cls}${isMe?' is-me':''}">
    ${isMe ? '<span class="uc-me-badge">MOI</span>' : ''}
    <div class="uc-top">
      <span class="uc-id">IMP-${n}</span>
      <span class="uc-time">${t ? '⏱ '+t : ''}</span>
    </div>
    <div class="uc-name">${u.username}</div>
    <div class="uc-grade">${roleLabel(u.role)}</div>
    ${withNames ? `<div class="uc-with">👥 ${withNames}</div>` : ''}
    ${st.action ? `<div class="uc-action">${st.action}</div>` : ''}
    <span class="uc-badge ${badge}">${lbl}</span>
  </div>`
}

// ══════════════════════════════════════════════
//  INTERVENTIONS PANEL
// ══════════════════════════════════════════════
let intPanelCollapsed = false
function toggleIntPanel() {
  intPanelCollapsed = !intPanelCollapsed
  const p = document.getElementById('intPanel')
  const t = document.getElementById('int-toggle')
  p.classList.toggle('collapsed', intPanelCollapsed)
  t.textContent = intPanelCollapsed ? '◀' : '▶'
}

function renderInterventions() {
  const list = document.getElementById('int-list')
  document.getElementById('int-count').textContent = interventions.length

  if (!interventions.length) {
    list.innerHTML = '<div class="col-empty" style="margin-top:18px;">Aucune intervention</div>'
    return
  }

  list.innerHTML = interventions.map(int => {
    const members = int.members.map(id => allUsers.find(u=>u.id===id)?.username).filter(Boolean)
    const age = Math.floor((Date.now() - int.createdAt) / 60000)
    const ageStr = age < 1 ? '< 1min' : age < 60 ? age+'min' : Math.floor(age/60)+'h'+String(age%60).padStart(2,'0')

    return `<div class="int-card">
      <div class="ic-top">
        <span class="ic-type">⚡ ${int.type}</span>
        <span class="ic-badge">actif</span>
      </div>
      ${int.lieu ? `<div class="ic-lieu">📍 ${int.lieu}</div>` : ''}
      ${int.desc ? `<div class="ic-desc">${int.desc}</div>` : ''}
      ${members.length ? `<div class="ic-members">${members.map(m=>`<span class="ic-member-chip">${m}</span>`).join('')}</div>` : ''}
      <div class="ic-footer">
        <span class="ic-time">⏱ ${ageStr}</span>
        <div style="display:flex;gap:5px;">
          <button class="ic-close-btn" style="color:var(--blue);border-color:rgba(68,153,255,.3);" onclick="assignMeToInt(${int.id})">+ Rejoindre</button>
          <button class="ic-close-btn" onclick="closeIntervention(${int.id})">✓ Code 4</button>
        </div>
      </div>
    </div>`
  }).join('')
}

// ══════════════════════════════════════════════
//  PANEL TOGGLE
// ══════════════════════════════════════════════
// (déjà définis plus haut)

// ══════════════════════════════════════════════
//  POLLING — refresh toutes les 20s
// ══════════════════════════════════════════════
async function refresh() {
  try {
    const s = await apiGet('/api/dispatch/status')
    if (s) {
      onlineSet    = new Set(s.online_ids || [])
      startTimes   = {}
      ;(s.start_times || []).forEach(({id,ts}) => { startTimes[id] = ts })
      playerStatus = s.player_status || {}
    }
  } catch(e) {}
  syncServiceBtn()
  renderAll()
}

setInterval(refresh, 20000)

// ── Init ──
loadData()
</script>
