<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SASP Portal - Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(30, 50, 90, 0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(20, 40, 80, 0.2) 0%, transparent 50%);
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 16px;
      width: 360px;
      padding: 36px 32px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .secure-badge span {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
      font-size: 0.65em;
      font-weight: 600;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .secure-badge::before { content: '🔒'; font-size: 0.75em; margin-right: 6px; }

    .logo-area { text-align: center; margin-bottom: 18px; }
    .logo-area .badge-img {
      width: 64px; height: 64px; margin-bottom: 12px;
      filter: drop-shadow(0 4px 12px rgba(255, 232, 31, 0.25));
    }
    .logo-area h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.6em; font-weight: 700;
      color: #ffffff; letter-spacing: 3px; text-transform: uppercase;
    }
    .logo-area p { font-size: 0.78em; color: #8b949e; margin-top: 4px; font-weight: 300; }

    .tabs {
      display: flex;
      border-bottom: 1px solid #21262d;
      margin-bottom: 24px; margin-top: 20px;
    }
    .tab {
      flex: 1; text-align: center; padding: 10px 0;
      font-size: 0.82em; font-weight: 500; color: #8b949e;
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: color 0.2s, border-color 0.2s;
      letter-spacing: 0.5px;
    }
    .tab.active { color: #4d9fff; border-bottom-color: #4d9fff; }
    .tab:hover:not(.active) { color: #c9d1d9; }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 0.7em; font-weight: 600;
      letter-spacing: 1.5px; color: #8b949e;
      text-transform: uppercase; margin-bottom: 6px;
    }

    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; padding: 11px 14px;
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 8px; color: #e6edf3;
      font-size: 0.9em; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .input-wrap input:focus {
      border-color: #4d9fff;
      box-shadow: 0 0 0 3px rgba(77, 159, 255, 0.1);
    }
    .input-wrap input::placeholder { color: #484f58; }

    .toggle-pass {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; color: #8b949e;
      cursor: pointer; font-size: 1em; padding: 0; line-height: 1;
    }
    .toggle-pass:hover { color: #c9d1d9; }

    .btn-primary {
      width: 100%; padding: 12px;
      background: #1f6feb; color: white; border: none;
      border-radius: 8px; font-size: 0.9em; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer; margin-top: 8px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      letter-spacing: 0.3px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover {
      background: #388bfd;
      box-shadow: 0 4px 16px rgba(31, 111, 235, 0.4);
    }
    .btn-primary:active { transform: scale(0.98); }

    #msg-login, #msg-register {
      text-align: center; font-size: 0.78em;
      margin-top: 12px; min-height: 18px; color: #f85149;
    }
    .msg-success { color: #3fb950 !important; }

    .card-footer {
      text-align: center; margin-top: 20px;
      font-size: 0.72em; color: #484f58;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="secure-badge">
      <span>Accès Sécurisé</span>
    </div>

    <div class="logo-area">
      <svg class="badge-img" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="badgeGrad" cx="50%" cy="40%" r="55%">
            <stop offset="0%" stop-color="#2d5a9e"/>
            <stop offset="100%" stop-color="#1a3a6e"/>
          </radialGradient>
        </defs>
        <polygon points="50,4 58,35 90,35 65,55 74,86 50,68 26,86 35,55 10,35 42,35"
          fill="url(#badgeGrad)" stroke="#FFE81F" stroke-width="2"/>
        <circle cx="50" cy="50" r="18" fill="#1a3a6e" stroke="#FFE81F" stroke-width="1.5"/>
        <text x="50" y="46" text-anchor="middle" fill="#FFE81F" font-size="7"
          font-family="Rajdhani,sans-serif" font-weight="700" letter-spacing="0.5">SASP</text>
        <text x="50" y="57" text-anchor="middle" fill="#c9d1d9" font-size="5.5"
          font-family="Inter,sans-serif">POLICE</text>
      </svg>
      <h1>SASP Portal</h1>
      <p>Identifiez-vous pour acceder aux outils de service</p>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Connexion</div>
      <div class="tab" onclick="switchTab('register')">Inscription</div>
    </div>

    <!-- CONNEXION -->
    <div class="form-panel active" id="panel-login">
      <div class="field">
        <label>Identifiant</label>
        <div class="input-wrap">
          <input type="text" id="login-username" placeholder="Identifiant" autocomplete="username" />
        </div>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="login-password" placeholder="••••••••••••" autocomplete="current-password" />
          <button class="toggle-pass" onclick="togglePass('login-password', this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn-primary" onclick="login()">→ Se connecter</button>
      <p id="msg-login"></p>
    </div>

    <!-- INSCRIPTION -->
    <div class="form-panel" id="panel-register">
      <div class="field">
        <label>Identifiant</label>
        <div class="input-wrap">
          <input type="text" id="reg-username" placeholder="Nouvel identifiant" autocomplete="off" />
        </div>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="reg-password" placeholder="••••••••••••" autocomplete="new-password" />
          <button class="toggle-pass" onclick="togglePass('reg-password', this)" tabindex="-1">👁</button>
        </div>
      </div>
      <!-- Pas de sélecteur de rôle : rôle "membre" assigné automatiquement -->
      <button class="btn-primary" onclick="register()">✚ Créer le compte</button>
      <p id="msg-register"></p>
    </div>

    <div class="card-footer">Session mémorisée jusqu'à déconnexion manuelle.</div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'))
      })
      document.getElementById('panel-login').classList.toggle('active', tab === 'login')
      document.getElementById('panel-register').classList.toggle('active', tab === 'register')
    }

    function togglePass(id, btn) {
      const input = document.getElementById(id)
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈' }
      else { input.type = 'password'; btn.textContent = '👁' }
    }

    function setMsg(id, text, success = false) {
      const el = document.getElementById(id)
      el.textContent = text
      el.className = success ? 'msg-success' : ''
    }

    async function login() {
      const username = document.getElementById('login-username').value
      const password = document.getElementById('login-password').value
      if (!username || !password) return setMsg('msg-login', 'Remplis tous les champs !')

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      const data = await res.json()
      if (data.token) {
        localStorage.setItem('token', data.token)
        window.location.href = '/dashboard.html'
      } else {
        setMsg('msg-login', data.message || 'Identifiants incorrects')
      }
    }

    async function register() {
      const username = document.getElementById('reg-username').value
      const password = document.getElementById('reg-password').value
      if (!username || !password) return setMsg('msg-register', 'Remplis tous les champs !')

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, role: 'membre' })
      })
      const data = await res.json()
      if (res.ok) {
        setMsg('msg-register', `✅ Compte "${username}" créé ! Un admin doit valider ton accès.`, true)
        document.getElementById('reg-username').value = ''
        document.getElementById('reg-password').value = ''
      } else {
        setMsg('msg-register', data.message || 'Erreur')
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('panel-login').classList.contains('active')) login()
        else register()
      }
    })
  </script>
</body>
</html>
