<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Empire Tool - Portail</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050508;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(180, 0, 0, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180, 0, 0, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(150, 0, 0, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: rgba(10, 8, 8, 0.95);
      border: 1px solid #3a0000;
      border-top: 2px solid #cc0000;
      border-radius: 4px;
      width: 380px;
      padding: 40px 36px 32px;
      box-shadow:
        0 0 40px rgba(180, 0, 0, 0.15),
        0 0 80px rgba(180, 0, 0, 0.06),
        inset 0 1px 0 rgba(255, 0, 0, 0.1);
      animation: fadeUp 0.5s ease;
      z-index: 1;
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: #cc0000;
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header { text-align: center; margin-bottom: 32px; }
    .empire-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.6em;
      font-weight: 700;
      color: #cc0000;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(200, 0, 0, 0.6), 0 0 40px rgba(200, 0, 0, 0.2);
    }
    .subtitle {
      font-size: 0.72em;
      color: #4a3030;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
      font-weight: 400;
    }
    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, #cc0000, transparent);
      margin: 14px auto 0;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #1e0000;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1; text-align: center; padding: 10px 0;
      font-size: 0.8em; font-weight: 500;
      color: #4a3030; cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .tab.active { color: #cc0000; border-bottom-color: #cc0000; }
    .tab:hover:not(.active) { color: #7a2020; }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 0.7em; font-weight: 600;
      letter-spacing: 2px; color: #5a3030;
      text-transform: uppercase; margin-bottom: 7px;
    }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%;
      padding: 11px 14px;
      background: #0a0505;
      border: 1px solid #2a0a0a;
      border-radius: 2px;
      color: #e0c0c0;
      font-size: 0.9em;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .input-wrap input:focus {
      border-color: #cc0000;
      box-shadow: 0 0 0 2px rgba(200, 0, 0, 0.1), 0 0 12px rgba(200, 0, 0, 0.1);
    }
    .input-wrap input::placeholder { color: #2e1515; }

    .toggle-pass {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; color: #4a2020;
      cursor: pointer; font-size: 0.9em; padding: 0; line-height: 1;
    }
    .toggle-pass:hover { color: #cc0000; }

    .btn-primary {
      width: 100%; padding: 12px;
      background: transparent;
      color: #cc0000;
      border: 1px solid #cc0000;
      border-radius: 2px;
      font-size: 0.82em; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer; margin-top: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover {
      background: #cc0000;
      color: #000;
      box-shadow: 0 0 20px rgba(200, 0, 0, 0.4);
    }
    .btn-primary:active { transform: scale(0.99); }

    #msg-login, #msg-register {
      text-align: center; font-size: 0.78em;
      margin-top: 14px; min-height: 18px;
      color: #cc0000; letter-spacing: 0.5px;
    }
    .msg-success { color: #4a7a4a !important; }

    .card-footer {
      text-align: center; margin-top: 24px;
      font-size: 0.68em; color: #2a1515;
      letter-spacing: 1px; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="empire-title">Empire Tool</div>
      <div class="subtitle">Portail Impérial — Accès Restreint</div>
      <div class="divider"></div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Connexion</div>
      <div class="tab" onclick="switchTab('register')">Inscription</div>
    </div>

    <!-- CONNEXION -->
    <div class="form-panel active" id="panel-login">
      <div class="field">
        <label>Identifiant</label>
        <div class="input-wrap">
          <input type="text" id="login-username" placeholder="identifiant" autocomplete="username" />
        </div>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="login-password" placeholder="••••••••••••" autocomplete="current-password" />
          <button class="toggle-pass" onclick="togglePass('login-password', this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn-primary" onclick="login()">→ Accéder</button>
      <p id="msg-login"></p>
    </div>

    <!-- INSCRIPTION -->
    <div class="form-panel" id="panel-register">
      <div class="field">
        <label>Identifiant</label>
        <div class="input-wrap">
          <input type="text" id="reg-username" placeholder="nouvel identifiant" autocomplete="off" />
        </div>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="reg-password" placeholder="••••••••••••" autocomplete="new-password" />
          <button class="toggle-pass" onclick="togglePass('reg-password', this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn-primary" onclick="register()">+ Créer</button>
      <p id="msg-register"></p>
    </div>

    <div class="card-footer">Accès soumis à validation impériale</div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'))
      })
      document.getElementById('panel-login').classList.toggle('active', tab === 'login')
      document.getElementById('panel-register').classList.toggle('active', tab === 'register')
    }

    function togglePass(id, btn) {
      const input = document.getElementById(id)
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈' }
      else { input.type = 'password'; btn.textContent = '👁' }
    }

    function setMsg(id, text, success = false) {
      const el = document.getElementById(id)
      el.textContent = text
      el.className = success ? 'msg-success' : ''
    }

    async function login() {
      const username = document.getElementById('login-username').value
      const password = document.getElementById('login-password').value
      if (!username || !password) return setMsg('msg-login', 'Remplis tous les champs !')

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      const data = await res.json()
      if (data.token) {
        localStorage.setItem('token', data.token)
        window.location.href = '/dashboard.html'
      } else {
        setMsg('msg-login', data.message || 'Identifiants incorrects')
      }
    }

    async function register() {
      const username = document.getElementById('reg-username').value
      const password = document.getElementById('reg-password').value
      if (!username || !password) return setMsg('msg-register', 'Remplis tous les champs !')

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, role: 'membre' })
      })
      const data = await res.json()
      if (res.ok) {
        setMsg('msg-register', `Compte "${username}" créé. En attente de validation.`, true)
        document.getElementById('reg-username').value = ''
        document.getElementById('reg-password').value = ''
      } else {
        setMsg('msg-register', data.message || 'Erreur')
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('panel-login').classList.contains('active')) login()
        else register()
      }
    })
  </script>
</body>
</html>
