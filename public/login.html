<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Empire Tool - Connexion</title>
  <style>
    body { background: #0a0a0a; color: #FFE81F; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: #111; padding: 40px; border-radius: 10px; border: 1px solid #FFE81F; width: 300px; }
    h2 { text-align: center; margin-bottom: 20px; }
    input { width: 100%; padding: 10px; margin: 8px 0; background: #222; border: 1px solid #FFE81F; color: white; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #FFE81F; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    #msg { text-align: center; margin-top: 10px; color: red; }
  </style>
</head>
<body>
  <div class="box">
    <h2>⚔️ Empire Tool</h2>
    <input type="text" id="username" placeholder="Identifiant" />
    <input type="password" id="password" placeholder="Mot de passe" />
    <button onclick="login()">Se connecter</button>
    <p id="msg"></p>
  </div>
  <script>
    async function login() {
      const username = document.getElementById('username').value
      const password = document.getElementById('password').value
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      const data = await res.json()
      if (data.token) {
        localStorage.setItem('token', data.token)
        window.location.href = '/dashboard.html'
      } else {
        document.getElementById('msg').textContent = data.message
      }
    }
  </script>
</body>
</html>
