<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Empire Tool - Roster</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050508;
      color: #fff;
      font-family: 'Inter', sans-serif;
      padding: 40px;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(180, 0, 0, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180, 0, 0, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      width: 800px; height: 800px;
      background: radial-gradient(ellipse, rgba(150, 0, 0, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .header h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.7em;
      font-weight: 700;
      color: #cc0000;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(200, 0, 0, 0.5);
    }

    .back {
      padding: 8px 18px;
      background: transparent;
      color: #cc0000;
      border: 1px solid #cc0000;
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.78em;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .back:hover {
      background: #cc0000;
      color: #000;
      box-shadow: 0 0 16px rgba(200, 0, 0, 0.4);
    }

    .create-box {
      background: rgba(10, 8, 8, 0.9);
      border: 1px solid #2a0a0a;
      border-top: 2px solid #cc0000;
      border-radius: 4px;
      padding: 25px;
      margin: 0 auto 30px auto;
      max-width: 500px;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 30px rgba(180, 0, 0, 0.1);
    }
    .create-box::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 10px; height: 10px;
      border-top: 2px solid #cc0000;
      border-left: 2px solid #cc0000;
    }
    .create-box::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 10px; height: 10px;
      border-bottom: 1px solid #cc0000;
      border-right: 1px solid #cc0000;
    }

    .create-box h2 {
      font-family: 'Rajdhani', sans-serif;
      color: #cc0000;
      margin-bottom: 15px;
      font-size: 1em;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .create-box input,
    .create-box select {
      width: 100%;
      padding: 10px 14px;
      margin: 6px 0;
      background: #0a0505;
      border: 1px solid #2a0a0a;
      border-radius: 2px;
      color: #e0c0c0;
      font-family: 'Inter', sans-serif;
      font-size: 0.88em;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .create-box input:focus,
    .create-box select:focus {
      border-color: #cc0000;
      box-shadow: 0 0 0 2px rgba(200, 0, 0, 0.1);
    }
    .create-box input::placeholder { color: #2e1515; }
    .create-box select option { background: #0a0505; }

    .btn-create {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: #cc0000;
      border: 1px solid #cc0000;
      border-radius: 2px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.78em;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 8px;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn-create:hover {
      background: #cc0000;
      color: #000;
      box-shadow: 0 0 16px rgba(200, 0, 0, 0.4);
    }

    /* Barre de recherche */
    .search-bar {
      position: relative;
      z-index: 1;
      margin-bottom: 16px;
    }
    .search-bar input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      background: rgba(10, 8, 8, 0.9);
      border: 1px solid #2a0a0a;
      border-radius: 2px;
      color: #e0c0c0;
      font-family: 'Inter', sans-serif;
      font-size: 0.85em;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar input:focus {
      border-color: #cc0000;
      box-shadow: 0 0 0 2px rgba(200, 0, 0, 0.1);
    }
    .search-bar input::placeholder { color: #2e1515; }
    .search-bar .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #3a1010;
      font-size: 0.85em;
      pointer-events: none;
    }
    .search-count {
      font-size: 0.7em;
      color: #3a1010;
      letter-spacing: 1px;
      margin-top: 6px;
      text-transform: uppercase;
    }

    #msg {
      margin-bottom: 20px;
      font-size: 0.82em;
      color: #4a7a4a;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
    }
    #msg.error { color: #cc0000; }

    table {
      width: 100%;
      border-collapse: collapse;
      position: relative;
      z-index: 1;
    }
    th {
      background: rgba(10, 8, 8, 0.9);
      color: #cc0000;
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid #2a0a0a;
      font-size: 0.7em;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }
    td {
      padding: 12px 14px;
      border-bottom: 1px solid #1a0505;
      font-size: 0.88em;
      color: #e0c0c0;
    }
    tr:hover td { background: rgba(20, 5, 5, 0.6); }
    tr.hidden { display: none; }

    /* Highlight recherche */
    .highlight {
      background: rgba(200, 0, 0, 0.25);
      color: #ff6666;
      border-radius: 2px;
      padding: 0 2px;
    }

    .role-select {
      background: #0a0505;
      color: #e0c0c0;
      border: 1px solid #2a0a0a;
      border-radius: 2px;
      padding: 5px 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85em;
      outline: none;
    }
    .role-select:focus { border-color: #cc0000; }

    .btn-save {
      background: transparent;
      color: #cc0000;
      border: 1px solid #cc0000;
      border-radius: 2px;
      padding: 5px 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.75em;
      font-weight: 600;
      letter-spacing: 1px;
      margin-right: 5px;
      transition: background 0.2s, color 0.2s;
    }
    .btn-save:hover { background: #cc0000; color: #000; }

    .btn-delete {
      background: transparent;
      color: #7a1010;
      border: 1px solid #7a1010;
      border-radius: 2px;
      padding: 5px 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.75em;
      font-weight: 600;
      letter-spacing: 1px;
      transition: background 0.2s, color 0.2s;
    }
    .btn-delete:hover { background: #7a1010; color: #fff; }

    .no-results {
      text-align: center;
      padding: 24px;
      color: #3a1010;
      font-size: 0.82em;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚙️ Gestion Empire</h1>
    <button class="back" onclick="window.location.href='/dashboard.html'">← Retour</button>
  </div>

  <div class="create-box">
    <h2>➕ Créer un compte</h2>
    <input type="text" id="new-username" placeholder="Identifiant" />
    <input type="password" id="new-password" placeholder="Mot de passe" />
    <select id="new-role">
      <option value="mdcn">Membre du Conseil Noir</option>
      <option value="darth">Darth</option>
      <option value="seigneur">Seigneur</option>
      <option value="maitrecaste">Maître de Caste</option>
      <option value="mrava">Maître des Ravageurs</option>
      <option value="msorcier">Maître des Sorciers</option>
      <option value="mmarau">Maître des Maraudeurs</option>
      <option value="masassin">Maître des Assassins</option>
      <option value="grandespe">Grande Spécialisation</option>
      <option value="grava">Grand Ravageur</option>
      <option value="gsorcier">Grand Sorcier</option>
      <option value="gmarau">Grand Maraudeur</option>
      <option value="gasassin">Grand Assassin</option>
      <option value="rava">Ravageur</option>
      <option value="marau">Maraudeur</option>
      <option value="assassin">Assassin</option>
      <option value="sorcier">Sorcier</option>
      <option value="guerrier">Guerrier</option>
      <option value="inqui">Inquisiteur</option>
      <option value="acolyte">Acolyte</option>
    </select>
    <button class="btn-create" onclick="createAccount()">Créer le compte</button>
  </div>

  <p id="msg"></p>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Rechercher un compte..." oninput="filterUsers()" />
  </div>
  <div class="search-count" id="search-count"></div>

  <table>
    <thead>
      <tr>
        <th>Identifiant</th>
        <th>Rôle</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="userList"></tbody>
  </table>
  <div class="no-results" id="no-results">Aucun compte trouvé</div>

  <script>
    const token = localStorage.getItem('token')
    if (!token) window.location.href = '/login.html'
    const payload = JSON.parse(atob(token.split('.')[1]))
    if (payload.role !== 'admin') {
      alert('⛔ Accès refusé')
      window.location.href = '/dashboard.html'
    }

    let allUsers = []

    function showMsg(text, isError = false) {
      const msg = document.getElementById('msg')
      msg.textContent = text
      msg.className = isError ? 'error' : ''
      setTimeout(() => msg.textContent = '', 3000)
    }

    function filterUsers() {
      const query = document.getElementById('search-input').value.toLowerCase().trim()
      const rows = document.querySelectorAll('#userList tr')
      let visible = 0

      rows.forEach(row => {
        const username = row.dataset.username || ''
        const match = username.toLowerCase().includes(query)
        row.classList.toggle('hidden', !match)

        // Highlight
        if (query && match) {
          const cell = row.querySelector('.username-cell')
          const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
          cell.innerHTML = username.replace(new RegExp(escaped, 'gi'), m => `<span class="highlight">${m}</span>`)
        } else {
          const cell = row.querySelector('.username-cell')
          if (cell) cell.textContent = username
        }

        if (match) visible++
      })

      const count = document.getElementById('search-count')
      const noResults = document.getElementById('no-results')

      if (query) {
        count.textContent = `${visible} résultat${visible !== 1 ? 's' : ''} pour "${query}"`
        noResults.style.display = visible === 0 ? 'block' : 'none'
      } else {
        count.textContent = `${rows.length} compte${rows.length !== 1 ? 's' : ''} au total`
        noResults.style.display = 'none'
      }
    }

    async function createAccount() {
      const username = document.getElementById('new-username').value
      const password = document.getElementById('new-password').value
      const role = document.getElementById('new-role').value
      if (!username || !password) return showMsg('❌ Remplis tous les champs !', true)

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ username, password, role })
      })
      const data = await res.json()
      if (res.ok) {
        showMsg(`✅ Compte "${username}" créé !`)
        document.getElementById('new-username').value = ''
        document.getElementById('new-password').value = ''
        loadUsers()
      } else {
        showMsg('❌ ' + data.message, true)
      }
    }

    async function loadUsers() {
      const res = await fetch('/api/admin/users', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      allUsers = await res.json()
      const tbody = document.getElementById('userList')
      tbody.innerHTML = ''

      allUsers.forEach(user => {
        tbody.innerHTML += `
          <tr data-username="${user.username}">
            <td class="username-cell">${user.username}</td>
            <td>
              <select class="role-select" id="role-${user.id}">
                <option value="membre" ${user.role === 'membre' ? 'selected' : ''}>Membre</option>
                <option value="officier" ${user.role === 'officier' ? 'selected' : ''}>Officier</option>
                <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
              </select>
            </td>
            <td>
              <button class="btn-save" onclick="updateUser(${user.id})">💾 Sauvegarder</button>
              <button class="btn-delete" onclick="deleteUser(${user.id}, '${user.username}')">🗑️ Supprimer</button>
            </td>
          </tr>
        `
      })

      filterUsers()
    }

    async function updateUser(id) {
      const role = document.getElementById('role-' + id).value
      const res = await fetch('/api/admin/users/' + id, {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ role })
      })
      const data = await res.json()
      showMsg('✅ ' + data.message)
    }

    async function deleteUser(id, username) {
      if (!confirm(`Supprimer le compte "${username}" ?`)) return
      const res = await fetch('/api/admin/users/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      })
      const data = await res.json()
      showMsg('✅ ' + data.message)
      loadUsers()
    }

    loadUsers()
  </script>
</body>
</html>
